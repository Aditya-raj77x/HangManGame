<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HangManGame By Aditya</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-model">
        <div class="content">
            <img src="./assets/lost.gif" alt="">
            <h1>Game Over!</h1>
            <p>The word was: <b>hangman</b></p>
            <button class="play-again">Play Again</button>
        </div>
    </div>
    <div class="contianer">
        <div class="hangman-box">
            <img src="./assets/hangman-0.svg" alt="handman-image">
            <h1>Hangman Game</h1>
        </div>
        <div class="game-box">
            <ul class="word-display">

            </ul>
            <h4 class="hint-text">
                hint:
                <b>this is hint</b>
            </h4>
            <h4 class="guess-text">
                Incorect guesses:
                <b>0/6</b>
            </h4>
            <div class="keyboard">

            </div>
        </div>
    </div>



    <script src="./wordList.js"></script>
    <script src="./script.js"></script>
</body>

</html>
