<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            display: grid;
            place-items: center;
        }

        .gamebox {
            padding: 10px;
            height: 200px;
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            background-color: aquamarine;
        }

        .gamebox h1 {
            color: crimson;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 32px;
        }

        .gamebox button {
            padding: 10px;
            border-radius: 12px;
            font-size: 18px;
            text-transform: uppercase;
            color: black;
        }

        .gamemodal {
            padding: 10px;
            height: 200px;
            width: 250px;
            position: fixed;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            background-color: palevioletred;
            pointer-events: none;
            display: none;
        }

        .gamemodal h1 {
            color: crimson;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 32px;
        }

        .gamemodal button {
            padding: 10px;
            border-radius: 12px;
            font-size: 18px;
            text-transform: uppercase;
            color: black;
        }

        :where(.gamebox, .gamemodal) button:hover {
            background-color: rgb(228, 203, 60);
            transition: all 0.8s ease;
        }

        .gamemodal.show {
            display: flex;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="gamemodal">
        <h1>win/loss</h1>
        <button>play again</button>
    </div>
    <div class="gamebox">
        <h1>play game</h1>
        <button>play</button>
    </div>
    <script>
        const gamebox = document.querySelector(".gamebox button");
        const gamemodal = document.querySelector(".gamemodal");
        const gamemodalBtn = document.querySelector(".gamemodal button");
        const start = () => {
            setTimeout(() => {
                gamemodal.classList.add("show");
            }, 1000)
        }
        gamebox.addEventListener("click", start)
        gamemodalBtn.addEventListener("click", () => {
            gamemodal.classList.remove("show");
        })
    </script>
</body>

</html>
