<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: chartreuse;
        }

        .container {
            display: flex;
            width: 800px;
            background-color: #fff;
            padding: 60px 40px;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            gap: 40px;
        }

        .container .hangmanBox img {
            max-width: 270px;

        }

        .hangmanBox h1 {
            font-size: 1.45rem;
            margin-top: 20px;
            text-align: center;
            text-transform: uppercase;
        }

        .gameBox .wordDisplay {
            display: flex;
            margin-bottom: 40px;
            /* background-color: red; */
            gap: 10px;
            justify-content: center;
        }

        .gameBox .wordDisplay .letter {
            width: 35px;
            border-bottom: 4px solid #000;
            list-style-type: none;
            font-size: 20px;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        .wordDisplay .letter.guessed {
            color: rgb(219, 110, 219);
            border-color: transparent;
            margin: -40px 0 30px;
        }

        .gussed {
            color: red;
            font-size: 22px;
        }

        .hintText,
        .guessText {
            margin: 20px 0px;
            font-size: 25px;
            font-weight: 700;
        }

        .hintText b {
            font-weight: 400;
        }

        .guessText b {
            color: red;
            font-weight: 400;
        }

        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
            gap: 10px;
        }

        .keyboard button {
            padding: 2px;
            border-radius: 4px;
            border: 1px outset black;
            color: #000;
            background-image: linear-gradient(to bottom right, white, yellow);
            font-size: 1rem;
            /* width: calc(100% / 9 - 5px); */
            width: 38px;
            transition: all 0.5s ease;
            text-transform: uppercase;
            scale: 0.9;

        }

        .keyboard button:hover {
            color: red;
            background-image: linear-gradient(to bottom right, white, chartreuse);
            scale: 1.02;
            /* border: inset; */
            /* width: 45px; */
        }

        .keyboard button:disabled {
            /* opacity: 0.4; */
            pointer-events: none;
        }

        .keyboard button:disabled::after {
            content: "X";
            color: red;
            position: absolute;
            font-size: 28px;
            height: 100%;
            width: 100%;
            opacity: 1;
            left: 0;
            top: 0;
        }

        .gameModal {
            position: fixed;
            z-index: 999;
            background-color: rgba(0, 0, 0, 0.5);
            height: 100%;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .gameModal.show {
            pointer-events: auto;
            opacity: 1;
        }

        .gameModal img {
            max-width: 130px;
            transition: all 0.5s ease;
        }

        .gameModal .content {
            background-color: #fff;
            /* height: 220px; */
            width: 350px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .gameModal .content h4 {
            margin: 10px 0px;
            font-size: 1.45rem;
        }

        .gameModal .content p {
            font-size: 22px;
            margin-bottom: 10px;

        }

        .gameModal .content b {
            color: red;
        }

        .gameModal button {
            padding: 5px;
            border-radius: 4px;
            border: 1px outset black;
            color: black;
            font-weight: bold;
            background-image: linear-gradient(to bottom right, white, yellow);
            font-size: 1rem;
            /* width: calc(100% / 9 - 5px); */
            /* width: 38px; */
            margin: 10px 0px;
            transition: all 0.5s ease;
            scale: 0.9;
        }

        .gameModal button:hover {
            /* font-size: 1.3rem; */
            scale: 1.3;
        }
    </style>
</head>

<body>
    <div class="gameModal">
        <div class="content">
            <img src="./assets/lost.gif" alt="">
            <h4>Game Over !</h4>
            <p>The correct word was <b>html</b></p>
            <button class="playAgain">Play Again</button>
        </div>
    </div>
    <div class="container">
        <div class="hangmanBox">
            <img src="./assets/hangman-0.svg" alt="hangman pic">
            <h1>Hangman Game</h1>
        </div>
        <div class="gameBox">
            <ul class="wordDisplay">
                <!-- <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li>
                <li class="letter"></li> -->
            </ul>
            <h4 class="hintText">hint :<b>this is hint</b></h4>
            <h4 class="guessText">Incrocect Guess <b>0/6</b></h4>
            <div class="keyboard"></div>
        </div>
    </div>
    <script src="./wordList.js"></script>
    <script>
        const keyboard = document.querySelector(".keyboard");
        const hintText = document.querySelector(".hintText b");
        const wordDisplay = document.querySelector(".wordDisplay");
        const hangmanPic = document.querySelector(".hangmanBox img");
        const guessText = document.querySelector(".guessText b");
        const gameModal = document.querySelector(".gameModal");
        const playAgain = document.querySelector(".playAgain");
        let currentWord, wrongGuess = 0, correctletter = [];
        const maxGuess = 6;

        const resetGame = () => {
            wrongGuess = 0;
            correctletter = [];
            hangmanPic.src = `assets/hangman-${wrongGuess}.svg`;
            guessText.innerHTML = `${wrongGuess}/${maxGuess}`;
            keyboard.querySelectorAll("button").forEach(btn => btn.disabled = false);
            wordDisplay.innerHTML = currentWord.split("").map(() => `<li class="letter"></li>`).join("");
            gameModal.classList.remove("show");

        }
        const randomWord = () => {
            const { word, hint } = wordList[Math.floor(Math.random() * wordList.length)]
            hintText.innerHTML = hint
            currentWord = word;
            console.log(word);

            resetGame();


        }
        const gameOver = (isVictory) => {
            setTimeout(() => {
                if (isVictory) {
                    document.querySelector(".gameModal h4").innerHTML = "Congrats";
                    document.querySelector(".gameModal p").innerHTML = "hurray you win the game";
                    document.querySelector(".gameModal img").src = `assets/victory.gif`;
                }
                else {
                    document.querySelector(".gameModal h4").innerHTML = "You Lost";
                    document.querySelector(".gameModal p").innerHTML = `Correct word was <b>${currentWord}</b>`;
                    document.querySelector(".gameModal img").src = `assets/lost.gif`;
                }
                gameModal.classList.add("show");
            }, 700);
        }

        const initGame = (button, pressedLetter) => {
            if (currentWord.includes(pressedLetter)) {
                [...currentWord].forEach((letter, index) => {
                    if (letter === pressedLetter) {
                        correctletter.push(letter);
                        wordDisplay.querySelectorAll("li")[index].innerHTML = letter;
                    }
                })
            }
            else {
                wrongGuess++;
                hangmanPic.src = `assets/hangman-${wrongGuess}.svg`;
            }
            guessText.innerHTML = `${wrongGuess}/${maxGuess}`;
            button.disabled = true;
            if (correctletter.length === currentWord.length) {
                gameOver(true);
            }
            if (wrongGuess === maxGuess) {
                gameOver(false);
            }

        }
        for (let i = 97; i <= 122; i++) {
            const button = document.createElement("button");
            button.innerHTML = String.fromCharCode(i);
            keyboard.appendChild(button);
            // console.log(button);
            button.addEventListener("click", e => initGame(e.target, String.fromCharCode(i)));
        }
        randomWord();
        playAgain.addEventListener("click", randomWord);
    </script>
</body>

</html>
